- type: custom-api
  title: Daily recipe
  cache: 6h
  url: "${MEALIE_URL}/api/recipes"
  method: GET
  parameters:
    perPage: 1
    orderBy: createdAt
    orderDirection: desc
  headers:
    Authorization: "Bearer ${MEALIE_API_TOKEN}"
  subrequests:
    today:
      url: "${MEALIE_URL}/api/households/mealplans/today"
      method: GET
      headers:
        Authorization: "Bearer ${MEALIE_API_TOKEN}"
  template: |
    {{ $today := .Subrequest "today" }}
    {{ if and (eq .Response.StatusCode 200) (eq $today.Response.StatusCode 200) }}
      {{ $total := .JSON.Int "total" }}
      {{ $plans := $today.JSON.Array "" }}
      {{ $dayNumber := (now | startOfDay | formatTime "unix" | toInt | div 86400 | toInt) }}
      {{ $page := add (mod $dayNumber $total) 1 }}
      {{ $daily := newRequest "${MEALIE_URL}/api/recipes"
        | withParameter "perPage" "1"
        | withParameter "orderBy" "createdAt"
        | withParameter "orderDirection" "desc"
        | withParameter "page" (printf "%d" $page)
        | withHeader "Authorization" "Bearer ${MEALIE_API_TOKEN}"
        | getResponse
      }}

      <div class="flex flex-column gap-10">
        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 8px; text-align:center;">
          <a class="card" href="${MEALIE_URL}/g/home/r/all">
            <div class="size-h2 color-highlight">{{ $total }}</div>
            <div class="size-h6 color-subdue">RECIPES</div>
          </a>
          <a class="card" href="${MEALIE_URL}/g/home/meal-plan">
            <div class="size-h2 {{ if gt (len $plans) 0 }}color-positive{{ else }}color-primary{{ end }}">{{ len $plans }}</div>
            <div class="size-h6 color-subdue">PLANNED TODAY</div>
          </a>
        </div>

        {{ if and (gt $total 0) (eq $daily.Response.StatusCode 200) }}
          {{ $recipe := index ($daily.JSON.Array "items") 0 }}
          <div class="card">
            <div class="size-h6 color-subdue margin-bottom-5">Random pick for today</div>
            <a class="size-h3 color-highlight text-truncate block" href="${MEALIE_URL}/g/home/r/{{ $recipe.String "slug" }}">{{ $recipe.String "name" }}</a>
            <div class="size-h6 color-subdue margin-top-3">Changes daily from your Mealie recipe list.</div>
            <ul class="list-horizontal-text margin-top-5">
              {{ if ne ($recipe.String "totalTime") "" }}<li>{{ $recipe.String "totalTime" }}</li>{{ end }}
              {{ range $recipe.Array "recipeCategory" }}<li>{{ .String "name" }}</li>{{ break }}{{ end }}
              {{ range $recipe.Array "tags" }}{{ if or (eq (.String "slug") "healthy") (eq (.String "slug") "easy-prep") (eq (.String "slug") "low-oil") (eq (.String "slug") "high-protein") }}<li>{{ .String "name" }}</li>{{ end }}{{ end }}
            </ul>
            {{ if ne ($recipe.String "description") "" }}
              <p class="size-h6 color-subdue margin-top-5">{{ $recipe.String "description" }}</p>
            {{ end }}
          </div>
        {{ else }}
          <div class="card">
            <div class="size-h4 color-primary">No recipes available</div>
            <div class="size-h6 color-subdue">Import healthy easy-prep meals into Mealie first.</div>
          </div>
        {{ end }}

        {{ if gt (len $plans) 0 }}
          <div>
            <div class="size-h6 color-subdue margin-bottom-5">Today's meal plan</div>
            <ul class="list list-gap-8">
              {{ range $plans }}
                {{ $name := .String "recipe.name" }}
                {{ if eq $name "" }}{{ $name = .String "title" }}{{ end }}
                {{ $slug := .String "recipe.slug" }}
                <li>
                  {{ if ne $slug "" }}
                    <a class="color-highlight text-truncate block" href="${MEALIE_URL}/g/home/r/{{ $slug }}">{{ $name }}</a>
                  {{ else }}
                    <span class="text-truncate block">{{ $name }}</span>
                  {{ end }}
                  <div class="size-h6 color-subdue">{{ .String "entryType" }}</div>
                </li>
              {{ end }}
            </ul>
          </div>
        {{ end }}
      </div>
    {{ else }}
      <p class="color-negative">Mealie API error: recipes {{ .Response.Status }} / today {{ $today.Response.Status }}</p>
    {{ end }}
