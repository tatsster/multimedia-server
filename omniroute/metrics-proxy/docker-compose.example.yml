services:
  omniroute-metrics-proxy:
    build: .
    container_name: omniroute-metrics-proxy
    restart: unless-stopped
    env_file:
      - /root/omniroute/metrics-proxy.env
    ports:
      - "20129:20129"
    volumes:
      # Read-only access to OmniRoute-generated JWT_SECRET.
      - /root/omniroute/data:/app/omniroute-data:ro
