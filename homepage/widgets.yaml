---
- datetime:
    text_size: xl
    locale: en-GB
    format:
      dateStyle: long
      timeStyle: short
      hourCycle: h23

- openmeteo:
    label: Ho Chi Minh City
    latitude: 10.8231
    longitude: 106.6297
    timezone: Asia/Ho_Chi_Minh
    units: metric
    cache: 5
    format:
      maximumFractionDigits: 1

- pvehealth:
    label: PVE Main
    href: https://beszel.liftlab.dev
    source: beszel
    systemId: "{{HOMEPAGE_VAR_BESZEL_SYSTEM_ID}}"
    refresh: 30000
    tempwarn: 70
    tempcrit: 85
    tempmax: 90
