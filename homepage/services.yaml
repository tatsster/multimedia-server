---
- Infrastructure:
    - Proxmox VE:
        icon: proxmox.png
        href: https://192.168.1.101:8006
        description: Proxmox cluster
        widget:
          type: proxmox
          url: https://192.168.1.101:8006
          username: "{{HOMEPAGE_VAR_PROXMOXVE_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PROXMOXVE_PASSWORD}}"

    - Proxmox Backup Server:
        icon: proxmox.png
        href: https://pbs.liftlab.dev
        description: Backup server
        widget:
          type: proxmoxbackupserver
          url: https://192.168.1.250:8007
          username: "{{HOMEPAGE_VAR_PROXMOXBACKUP_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PROXMOXBACKUP_PASSWORD}}"

    - Beszel:
        icon: beszel.png
        href: https://beszel.liftlab.dev
        siteMonitor: http://192.168.1.115:8090
        description: Proxmox monitoring

    - OmniRoute Usage:
        icon: openai.png
        href: https://omniroute.liftlab.dev
        description: 7-day LLM usage summary
        widget:
          type: customapi
          url: "http://192.168.1.109:20129/summary?range=7d"
          refreshInterval: 60000
          headers:
            Authorization: "Bearer {{HOMEPAGE_VAR_OMNIROUTE_DASHBOARD_TOKEN}}"
          display: block
          mappings:
            - field: summary.totalRequests
              label: Requests
              format: number
            - field: summary.totalTokens
              label: Tokens
              format: number
            - field: summary.successRatePct
              label: Success
              format: percent
            - field: summary.avgLatencyMs
              label: Latency
              suffix: ms
            - field: summary.uniqueModels
              label: Models
              format: number
            - field: summary.totalCost
              label: Cost
              prefix: $
              format: float

- Services:
    - Jellyfin:
        icon: jellyfin.png
        href: https://play.liftlab.dev
        siteMonitor: http://192.168.1.104:8096
        description: Media server
        widget:
          type: jellyfin
          url: "{{HOMEPAGE_VAR_JELLYFIN_URL}}"
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          version: 2
          enableNowPlaying: true
          enableBlocks: true
          enableUser: true

    - Mealie:
        icon: mealie.png
        href: https://mealie.liftlab.dev
        siteMonitor: http://192.168.1.112:9925
        description: Meal planner
        widget:
          type: mealie
          url: "{{HOMEPAGE_VAR_MEALIE_URL}}"
          key: "{{HOMEPAGE_VAR_MEALIE_API_TOKEN}}"
          version: 2

    - Speedtest Tracker:
        icon: librespeed.png
        href: https://speedtest.liftlab.dev
        siteMonitor: http://192.168.1.113
        description: Internet speed tests
        widget:
          type: speedtest
          url: "{{HOMEPAGE_VAR_SPEEDTEST_URL}}"
          version: 2
          key: "{{HOMEPAGE_VAR_SPEEDTEST_API_TOKEN}}"
          bitratePrecision: 2

    - Jellyseerr:
        icon: jellyseerr.png
        href: https://media.liftlab.dev
        siteMonitor: http://192.168.1.105:5055
        description: Media requests

    - Portainer:
        icon: portainer.png
        href: https://portainer.liftlab.dev
        description: Container management

    - VaultWarden:
        icon: vaultwarden.png
        href: https://vaultwarden.liftlab.dev
        description: Password vault

    - n8n:
        icon: n8n.png
        href: https://n8n.liftlab.dev
        siteMonitor: http://192.168.1.107:5678
        description: Automation

    - OmniRoute:
        icon: openai.png
        href: https://omniroute.liftlab.dev
        siteMonitor: http://192.168.1.109:20128
        description: LLM routing

    - Hindsight:
        icon: mdi-brain
        href: https://hindsight.liftlab.dev
        siteMonitor: http://192.168.1.111:9999
        description: Memory provider

- Arr-suite:
    - Radarr:
        icon: radarr.png
        href: https://radarr.liftlab.dev
        siteMonitor: http://192.168.1.103:7878
        widget:
          type: radarr
          url: http://192.168.1.103:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"

    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.liftlab.dev
        siteMonitor: http://192.168.1.103:8989
        widget:
          type: sonarr
          url: http://192.168.1.103:8989
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"

    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.liftlab.dev
        siteMonitor: http://192.168.1.103:9696
        widget:
          type: prowlarr
          url: http://192.168.1.103:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"

    - qBittorrent:
        icon: qbittorrent.png
        href: https://torrent.liftlab.dev
        description: Torrents via VPN
        widget:
          type: customapi
          url: "http://192.168.1.103:9911/qb/torrents"
          refreshInterval: 60000
          headers:
            Authorization: "Bearer {{HOMEPAGE_VAR_QBITTORRENT_DASHBOARD_TOKEN}}"
          mappings:
            - field: total_download_speed
              label: Down
              format: bytes
              suffix: /s
            - field: total_upload_speed
              label: Up
              format: bytes
              suffix: /s
              remap:
                - value: null
                  to: 0
            - field: seeding_count
              label: Seeding
              format: number
            - field: leeching_count
              label: Leeching
              format: number
            - field: torrents
              label: Torrents
              format: size

    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.liftlab.dev

    - Tdarr:
        icon: tdarr.png
        href: https://tdarr.liftlab.dev

    - Flaresolverr:
        icon: flaresolverr.png
        href: https://flaresolverr.liftlab.dev

    - Lingarr:
        icon: mdi-translate
        href: https://lingarr.liftlab.dev
