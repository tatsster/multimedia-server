---
- Infrastructure:
    - Proxmox VE:
        icon: proxmox.svg
        href: https://192.168.1.101:8006
        description: PVE host and LXC/VM cluster
        ping: 192.168.1.101
        widget:
          type: proxmox
          url: https://192.168.1.101:8006
          username: "{{HOMEPAGE_VAR_PROXMOXVE_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PROXMOXVE_PASSWORD}}"
          fields: ["vms", "lxc", "resources.cpu", "resources.mem"]

    - Proxmox Backup Server:
        icon: proxmox.svg
        href: https://pbs.liftlab.dev
        description: Backup server and datastore status
        ping: 192.168.1.250
        widget:
          type: proxmoxbackupserver
          url: https://192.168.1.250:8007
          username: "{{HOMEPAGE_VAR_PROXMOXBACKUP_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PROXMOXBACKUP_PASSWORD}}"
          fields: ["datastore_usage", "failed_tasks_24h", "cpu_usage", "memory_usage"]

    - Portainer:
        icon: portainer.svg
        href: https://portainer.liftlab.dev
        description: Docker stack management
        ping: 192.168.1.103

    - Homepage:
        icon: homepage.svg
        href: https://liftlab.dev
        description: Main homelab dashboard
        ping: 192.168.1.114

- Media:
    - Jellyfin:
        icon: jellyfin.svg
        href: https://play.liftlab.dev
        description: Movies and TV streaming
        siteMonitor: http://192.168.1.104:8096
        widget:
          type: jellyfin
          url: http://192.168.1.104:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          version: 2
          enableBlocks: true
          enableNowPlaying: true
          enableUser: true
          fields: ["movies", "series", "episodes"]

    - Jellyseerr:
        icon: jellyseerr.svg
        href: https://media.liftlab.dev
        description: Media requests
        siteMonitor: http://192.168.1.105:5055
        widget:
          type: seerr
          url: http://192.168.1.105:5055
          key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"

    - Mealie:
        icon: mealie.svg
        href: https://mealie.liftlab.dev
        description: Recipes and meal planning
        siteMonitor: http://192.168.1.112:9925
        widget:
          type: mealie
          url: http://192.168.1.112:9925
          key: "{{HOMEPAGE_VAR_MEALIE_API_TOKEN}}"
          version: 2
          fields: ["recipes", "categories", "tags"]

    - Speedtest Tracker:
        icon: speedtest-tracker.svg
        href: http://192.168.1.113
        description: Internet speed history
        ping: 192.168.1.113
        widget:
          type: speedtest
          url: "{{HOMEPAGE_VAR_SPEEDTEST_URL}}"
          version: 2
          key: "{{HOMEPAGE_VAR_SPEEDTEST_API_TOKEN}}"
          bitratePrecision: 2
          fields: ["download", "upload", "ping"]

- Arr Suite:
    - qBittorrent:
        icon: qbittorrent.svg
        href: https://torrent.liftlab.dev
        description: Torrent client; keep traffic locked to VPN only
        siteMonitor: http://192.168.1.103:8080
        widget:
          type: qbittorrent
          url: http://192.168.1.103:8080
          username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
          password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"
          fields: ["leech", "download", "seed", "upload"]
          enableLeechProgress: true
          enableLeechSize: true

    - Radarr:
        icon: radarr.svg
        href: https://radarr.liftlab.dev
        description: Movie library automation
        siteMonitor: http://192.168.1.103:7878
        widget:
          type: radarr
          url: http://192.168.1.103:7878
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
          fields: ["wanted", "missing", "queued", "movies"]

    - Sonarr:
        icon: sonarr.svg
        href: https://sonarr.liftlab.dev
        description: TV library automation
        siteMonitor: http://192.168.1.103:8989
        widget:
          type: sonarr
          url: http://192.168.1.103:8989
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
          fields: ["wanted", "queued", "series"]

    - Prowlarr:
        icon: prowlarr.svg
        href: https://prowlarr.liftlab.dev
        description: Indexer management
        siteMonitor: http://192.168.1.103:9696

    - Bazarr:
        icon: bazarr.svg
        href: https://bazarr.liftlab.dev
        description: Subtitle management
        siteMonitor: http://192.168.1.103:6767

    - Tdarr:
        icon: tdarr.svg
        href: https://tdarr.liftlab.dev
        description: Media transcoding automation
        siteMonitor: http://192.168.1.103:8265

    - FlareSolverr:
        icon: flaresolverr.svg
        href: https://flaresolverr.liftlab.dev
        description: Cloudflare challenge solver for indexers
        siteMonitor: http://192.168.1.103:8191

    - Lingarr:
        icon: lingarr.svg
