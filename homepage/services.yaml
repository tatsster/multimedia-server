- AI & Agents:
    - OmniRoute:
        icon: openai.svg
        href: https://omniroute.liftlab.dev
        description: AI router and OpenAI-compatible API gateway
        siteMonitor: http://192.168.1.109:20128
        widget:
          type: customapi
          url: http://192.168.1.109:20129/summary?range=7d
          refreshInterval: 300000
          headers:
            Authorization: "Bearer {{HOMEPAGE_VAR_OMNIROUTE_DASHBOARD_TOKEN}}"
          mappings:
            - field: summary.totalRequests
              label: Requests 7d
              format: number
            - field: summary.totalTokens
              label: Tokens 7d
              format: number
            - field: summary.successRatePct
              label: Success
              format: percent

    - Hermes:
        icon: mdi-robot-outline.svg
        href: http://192.168.1.110
        description: Personal assistant / automation agent
        ping: 192.168.1.110

    - Hindsight:
        icon: mdi-brain.svg
        href: https://hindsight.liftlab.dev
        description: Hermes memory backend and control plane
        siteMonitor: http://192.168.1.111:9999/dashboard

