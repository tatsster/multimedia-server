# Sanitized Hermes system-level config example.
# Copy to /root/.hermes/config.yaml on the Hermes LXC, then replace placeholders
# through /root/.hermes/.env or `hermes config set`.
#
# Do not commit real API keys, provider tokens, Discord tokens, Proxmox token
# secrets, channel IDs, or private user IDs.

model:
  default: codex/gpt-5.5-medium
  provider: custom
  base_url: ${OMNIROUTE_BASE_URL}
  api_key: ${OMNIROUTE_API_KEY}
  max_tokens: 65536

providers: {}
fallback_providers: []
credential_pool_strategies: {}

toolsets:
  - hermes-cli

agent:
  max_turns: 100
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: false
  disabled_toolsets: []
  verbose: false
  reasoning_effort: medium
  personalities:
    concise: You are a concise technical assistant. Keep responses brief and useful.

terminal:
  backend: local
  cwd: .
  timeout: 180
  persistent_shell: true
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true

browser:
  inactivity_timeout: 120
  command_timeout: 30
  allow_private_urls: false
  auto_local_for_private_urls: true
  use_gateway: false

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 600
  user_char_limit: 400
  provider: hindsight
  nudge_interval: 30
  flush_min_turns: 12

# Hindsight client details live in /root/.hermes/hindsight/config.json.
# Current target from the inventory:
#   HINDSIGHT_API_URL=http://192.168.1.111:8888

# Delegation is enabled at the platform/toolset level. Keep child settings simple
# unless intentionally tuning subagent behavior.
delegation:
  model: ''
  provider: ''
  base_url: ''
  api_key: ''
  inherit_mcp_toolsets: false
  child_timeout_seconds: 600
  orchestrator_enabled: false
  subagent_auto_approve: false

display:
  compact: true
  personality: concise
  streaming: true
  final_response_markdown: strip
  background_process_notifications: all

web:
  backend: firecrawl
  use_gateway: false

# Platform integrations. Fill these from /root/.hermes/.env or with
# placeholder-safe values before enabling a gateway.
discord:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ${DISCORD_ALLOWED_USERS}
  auto_thread: true
  reactions: false
  channel_prompts: {}

telegram:
  reactions: false
  channel_prompts: {}

# Toolset availability by platform. Keep CLI and Discord aligned with the live
# homelab expectation: delegation, image_gen, and kanban are available.
platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - cronjob
    - delegation
    - file
    - image_gen
    - kanban
    - memory
    - messaging
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web
  discord:
    - browser
    - clarify
    - code_execution
    - delegation
    - file
    - image_gen
    - kanban
    - memory
    - messaging
    - session_search
    - skills
    - terminal
    - todo
    - web
  telegram:
    - hermes-telegram
  whatsapp:
    - hermes-whatsapp
  slack:
    - hermes-slack
  signal:
    - hermes-signal
  homeassistant:
    - hermes-homeassistant
  yuanbao:
    - hermes-yuanbao
  teams:
    - hermes-teams

known_plugin_toolsets:
  cli:
    - spotify
  discord: []

# Optional auxiliary providers. Image generation needs a separate provider and
# does not automatically reuse the OmniRoute chat model provider.
auxiliary:
  image_gen:
    provider: ${IMAGE_GEN_PROVIDER}
    model: ${IMAGE_GEN_MODEL}
    api_key: ${IMAGE_GEN_API_KEY}
  vision:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
  web_extract:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 360

# Custom OmniRoute provider used by Hermes.
custom_providers:
  - name: Selfhosted Omniroute
    base_url: ${OMNIROUTE_BASE_URL}
    api_key: ${OMNIROUTE_API_KEY}
    model: codex/gpt-5.5-medium

# Proxmox tool placeholders. Create a scoped Proxmox API token in the Proxmox UI
# and keep the secret only in /root/.hermes/.env or a password manager.
PROXMOX_HOST: ${PROXMOX_HOST}
PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID}
PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET}

_config_version: 23
